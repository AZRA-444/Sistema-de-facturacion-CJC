<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Iniciar sesión — Administración</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .login-card {
        width: 100%;
        max-width: 360px;
        padding: 32px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .login-card h1 {
        font-size: 1.3rem;
        margin: 0 0 20px;
        text-align: center;
      }
      .login-card .field {
        margin-bottom: 14px;
      }
      .login-card label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.85rem;
        opacity: 0.8;
      }
      .login-card input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.2);
        color: inherit;
      }
      .login-card button {
        width: 100%;
        margin-top: 6px;
      }
      #login-error {
        color: #ef4444;
        font-size: 0.85rem;
        margin-top: 10px;
        min-height: 1.1em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <form class="login-card" id="form-login">
      <h1><i class="fas fa-user-shield"></i> Acceso de administración</h1>

      <div class="field">
        <label for="login-email">Correo</label>
        <input type="email" id="login-email" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn" id="btn-login">
        <i class="fas fa-right-to-bracket"></i> Entrar
      </button>
      <button type="submit" class="btn" id="btn-volver" onclick="volver()">
        <i class="fas fa-arrow-left"></i> volver
      </button>

      <p id="login-error"></p>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script>
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Si ya hay sesión activa, no tiene sentido mostrar el login de nuevo.
      client.auth.getSession().then(({ data }) => {
        if (data?.session) {
          window.location.href = "administrador.html";
        }
      });

      document.getElementById("form-login").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const boton = document.getElementById("btn-login");
        const errorEl = document.getElementById("login-error");

        errorEl.textContent = "";
        boton.disabled = true;
        boton.textContent = "Entrando…";

        const { error } = await client.auth.signInWithPassword({ email, password });

        if (error) {
          errorEl.textContent = "Correo o contraseña incorrectos.";
          boton.disabled = false;
          boton.innerHTML = '<i class="fas fa-right-to-bracket"></i> Entrar';
          return;
        }

        window.location.href = "administrador.html";
      });

      function volver() {
        window.location.href = "../../index.html";
      }
    </script>
  </body>
</html>
